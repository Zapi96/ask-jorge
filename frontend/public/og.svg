<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#080807"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a18" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Gold accent line -->
  <rect x="80" y="200" width="3" height="160" fill="#C9A84C"/>

  <!-- Name -->
  <text
    x="110"
    y="275"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="80"
    font-weight="bold"
    fill="#F2EDE6"
    letter-spacing="-2"
  >Jorge Martínez Zapico</text>

  <!-- Title -->
  <text
    x="112"
    y="330"
    font-family="'Courier New', monospace"
    font-size="28"
    fill="#C9A84C"
    letter-spacing="4"
  >SENIOR MLOPS &amp; AI ENGINEER</text>

  <!-- Divider -->
  <rect x="110" y="360" width="980" height="1" fill="#2a2a27"/>

  <!-- Bottom tagline -->
  <text
    x="112"
    y="400"
    font-family="'Courier New', monospace"
    font-size="20"
    fill="#6b6b65"
    letter-spacing="2"
  >ask.jorge.info · Powered by Databricks RAG</text>

  <!-- "AJ" monogram top-right -->
  <rect x="1060" y="40" width="100" height="100" rx="16" fill="#1a1a15"/>
  <rect x="1060" y="40" width="100" height="100" rx="16" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <text
    x="1110"
    y="112"
    font-family="Georgia, serif"
    font-size="48"
    font-weight="bold"
    fill="#C9A84C"
    text-anchor="middle"
  >J</text>
</svg>
