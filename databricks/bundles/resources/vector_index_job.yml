resources:
  jobs:
    vector_index_job:
      name: jorge-cv-vector-index
      environments:
        - environment_key: vector_index_env
          spec:
            client: "1"
      tasks:
        - task_key: create_or_sync_index
          environment_key: vector_index_env
          notebook_task:
            notebook_path: ../notebooks/2_vector_index.ipynb
          # Creating a VS endpoint can take up to 20 min on first run.
          # Subsequent syncs are faster (seconds to minutes).
          timeout_seconds: 3600
      email_notifications:
        on_failure:
          - jorgemartinezzapico@gmail.com
