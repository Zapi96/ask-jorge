resources:
  jobs:
    ingestion_job:
      name: jorge-cv-ingestion
      environments:
        - environment_key: ingestion_env
          spec:
            client: "2"
            dependencies:
              - pypdf
              - transformers
        - environment_key: vector_index_env
          spec:
            client: "2"
      tasks:
        - task_key: ingest_document
          environment_key: ingestion_env
          notebook_task:
            notebook_path: ../notebooks/1_ingestion.ipynb
            base_parameters:
              file_path: ""
              full_reindex: "true"
          timeout_seconds: 1800

        - task_key: sync_vector_index
          depends_on:
            - task_key: ingest_document
          environment_key: vector_index_env
          notebook_task:
            notebook_path: ../notebooks/2_vector_index.ipynb
          timeout_seconds: 3600

      email_notifications:
        on_failure:
          - jorgemartinezzapico@gmail.com
