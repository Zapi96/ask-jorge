resources:
  jobs:
    ingestion_job:
      name: jorge-cv-ingestion
      environments:
        - environment_key: ingestion_env
          spec:
            client: "1"
            dependencies:
              - pypdf
              - transformers
      tasks:
        - task_key: ingest_document
          environment_key: ingestion_env
          notebook_task:
            notebook_path: ../notebooks/1_ingestion.ipynb
            base_parameters:
              file_path: ""
              full_reindex: "true"
          timeout_seconds: 1800
      email_notifications:
        on_failure:
          - jorgemartinezzapico@gmail.com
