services:
  - type: web
    name: ask-jorge-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABRICKS_HOST
        sync: false
      - key: DATABRICKS_TOKEN
        sync: false
      - key: DATABRICKS_JOB_ID
        sync: false
      - key: DATABRICKS_ENDPOINT_NAME
        sync: false
      - key: DATABRICKS_VOLUME_PATH
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MAX_TOKENS_INPUT
        value: "200"
      - key: MAX_TOKENS_OUTPUT
        value: "500"
      - key: RATE_LIMIT_PER_MINUTE
        value: "5"
      - key: RATE_LIMIT_PER_HOUR
        value: "20"
